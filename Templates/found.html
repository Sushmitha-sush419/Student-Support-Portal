<!DOCTYPE html>
<html>
<head>
    <title>Student Support Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #2c3e50;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 20px;
            text-align: center;
        }

        .main img {
            width: 60%;
            border-radius: 10px;
        }

        .quote {
            margin-top: 20px;
            font-size: 18px;
            font-style: italic;
        }

        /* Notification panel */
        .right {
            width: 250px;
            background: #ecf0f1;
            padding: 20px;
        }

        .notification {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🎓 Portal</h2>

        <a href="/">Home</a>
        <a href="/lost">Lost & Found</a>
        <a href="/complaint">Complaint</a>
        <a href="/materials">Study Materials</a>
        <a href="/career">AI Career</a>
        <a href="/doubt">Doubt Clearance</a>
    </div>

    <!-- Main Content -->
    <div class="main">
        <h1>Welcome to Student Support Portal</h1>

        <img src="https://via.placeholder.com/500x250">

        <div class="quote">
            “Small steps today, big success tomorrow 💜”
        </div>
    </div>

    <!-- Right Panel -->
    <div class="right">
        <h3>🔔 Notifications</h3>

        <div class="notification">New lost item posted</div>
        <div class="notification">Complaint resolved</div>
        <div class="notification">New study material added</div>
    </div>

</body>
</html>
