<html>
<head>
<style>
body {
    display: flex;
    justify-content: center;   /* horizontal center */
    align-items: center;       /* vertical center */
    height: 100vh;             /* full screen height */
    margin: 0;
    background: #f5f6fa;
    font-family: Arial;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    width: 300px;
}
</style>
</head>
<body>
<div class="container>"
    <h2>Claim Item</h2>

    <form method="POST">

       Your Name:<br>
       <input type="text" name="name" required><br><br>

       Describe item (proof):<br>
       <textarea name="proof" required></textarea><br><br>

       Answer secret question:<br>
       <input type="text" name="secret" required><br><br>

       <button type="submit">Submit Claim</button>

</form>
</div>
</body>
</html>
