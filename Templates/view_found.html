<!DOCTYPE html>
<html>
<head>
    <title>Found Items</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            width: 60%;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: left;
        }

        img {
            width: 150px;
            margin-top: 10px;
            border-radius: 8px;
        }

        .back {
            display: inline-block;
            margin: 20px;
            text-decoration: none;
            color: white;
            background: #007bff;
            padding: 8px 15px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <a href="/" class="back">⬅ Back to Portal</a>

    <h1>📦 Found Items</h1>

    <div class="container">

        {% if data %}
            {% for item in data %}
                <div class="card">
                    <h3>{{ item[1] }}</h3>
                    <p><b>Description:</b> {{ item[2] }}</p>
                    <p><b>Location:</b> {{ item[3] }}</p>
                    <p><b>Contact:</b> {{ item[4] }}</p>

                    {% if item[5] %}
                        <img src="{{ url_for('static', filename='uploads/' + item[5]) }}">
                    {% endif %}
                </div>
            {% endfor %}
        {% else %}
            <h3>No found items yet 😕</h3>
        {% endif %}

    </div>

</body>
</html>
